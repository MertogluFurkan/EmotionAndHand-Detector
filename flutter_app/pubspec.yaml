name: aurascan
description: AI tabanlı yüz duygusu ve cilt analizi uygulaması
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Kamera
  camera: ^0.10.5+9

  # HTTP
  http: ^1.2.1

  # Görüntü seçici (galeri desteği)
  image_picker: ^1.1.2

  # İzin yönetimi
  permission_handler: ^11.3.1

  # Animasyon
  flutter_animate: ^4.5.0

  # Yazı tipleri
  google_fonts: ^6.2.1

  # Grafik
  fl_chart: ^0.68.0

  # Yerel depolama
  shared_preferences: ^2.2.3

  # Yol
  path_provider: ^2.1.3

  # İkonlar
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
